name: Supabase Keep-Alive Cron

on:
  schedule:
    # Runs at 00:00 UTC every 3 days (Supabase free tier pauses after 7 days of inactivity)
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allows manual one-click trigger from GitHub Actions tab

jobs:
  keep-alive:
    name: Ping Supabase REST API
    runs-on: ubuntu-latest
    steps:
      - name: Send Keep-Alive Ping to Supabase
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          TARGET_URL="${SUPABASE_URL:-https://cntaedhrwpxhfvqikpwu.supabase.co}"
          ANON_KEY="${SUPABASE_ANON_KEY}"
          
          echo "Sending automated keep-alive ping to Supabase: $TARGET_URL"
          
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $ANON_KEY" \
            -H "Authorization: Bearer $ANON_KEY" \
            "$TARGET_URL/rest/v1/app_state?select=key&limit=1" || true)
            
          echo "Supabase Response HTTP Status Code: $HTTP_STATUS"
          
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 500 ]; then
            echo "SUCCESS: Supabase project is active, responsive, and reset from pausing timer!"
          else
            echo "WARNING: Unexpected HTTP status $HTTP_STATUS received."
          fi
